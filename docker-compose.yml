services:
  db_container:
    image: postgres:16
    container_name: postgreSQL
    restart: always
    environment:
      POSTGRES_DB: Ingenieria_Software_DB
      POSTGRES_USER: haans_lopez
      POSTGRES_PASSWORD: Haansi_2468
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
  django_container:
    build: .
    container_name: django
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db_container

volumes:
  postgres_data: